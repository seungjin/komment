<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komment WASM Sample</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; line-height: 1.5; }
        #komment { border-top: 1px solid #eee; padding-top: 20px; margin-top: 40px; }
        #login-btn { background: #24292f; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        #login-btn:hover { background: #1b1f23; }
        .error { color: #cf222e; background: #ffebe9; padding: 12px; border-radius: 6px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Komment WASM Integration</h1>
    <p>This page demonstrates Komment WASM with OAuth authentication.</p>

    <div id="komment">Checking authentication...</div>
    <button id="login-btn" style="display:none">Login with GitHub to comment</button>

    <script type="module">
        import init, { Komment } from "./pkg/komment.js";

        // Your Cloudflare Worker endpoint
        const TOKEN_ENDPOINT = "https://komment-wasm.s42.workers.dev/api/token"; 
        const REPO = "seungjin/komment";
        const CLIENT_ID = "----";

        async function startKomment() {
            try {
                await init();
            } catch (e) {
                document.getElementById("komment").innerHTML = '<div class="error">Failed to initialize WASM.</div>';
                return;
            }

            // 1. Handle OAuth Callback
            const params = new URLSearchParams(window.location.search);
            const code = params.get("code");
            if (code) {
                document.getElementById("komment").innerText = "Exchanging code for token...";
                try {
                    const res = await fetch(TOKEN_ENDPOINT, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ code })
                    });
                    const data = await res.json();
                    if (data.access_token) {
                        localStorage.setItem("gh_token", data.access_token);
                    } else if (data.error) {
                        throw new Error(data.error_description || data.error);
                    }
                    window.history.replaceState({}, document.title, window.location.pathname);
                } catch (err) {
                    console.error("Token exchange failed:", err);
                    document.getElementById("komment").innerHTML = `<div class="error">Token exchange failed: ${err.message}</div>`;
                }
            }

            // 2. Setup Configuration
            const token = localStorage.getItem("gh_token");
            if (!token) {
                document.getElementById("komment").innerText = "Please log in to view and post comments.";
                document.getElementById("login-btn").style.display = "block";
                return;
            }

            document.getElementById("komment").innerText = "Loading comments...";

            const config = {
                repo: REPO,
                mapping: "title",
                term: window.location.href,
                token: token
            };

            // 3. Render
            const komment = new Komment(config);
            try {
                const data = await komment.fetch_discussion();
                komment.render("komment", data);
            } catch (e) {
                console.error("Komment error:", e);
                document.getElementById("komment").innerHTML = `<div class="error">Failed to load discussion. Ensure the repository exists and the token is valid.</div>`;
                // If it fails, maybe the token is expired
                if (e.toString().includes("401")) {
                    localStorage.removeItem("gh_token");
                    document.getElementById("login-btn").style.display = "block";
                }
            }
        }

        // 4. Handle Login Button
        document.getElementById("login-btn").onclick = () => {
            window.location.href = `https://github.com/login/oauth/authorize?client_id=${CLIENT_ID}&scope=public_repo`;
        };

        startKomment();
    </script>
</body>
</html>
