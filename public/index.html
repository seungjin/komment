<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komment WASM</title>
    <style>
      :root {
        --color-btn-bg: #2da44e;
        --color-btn-hover: #2c974b;
        --color-btn-active: #298e46;
        --color-border: #d0d7de;
        --color-bg-subtle: #f6f8fa;
        --color-danger: #cf222e;
        --color-danger-bg: #ffebe9;
        --shadow-sm: 0 1px 0 rgba(27, 31, 36, 0.1);
      }

      body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
        max-width: 800px; 
        margin: 0 auto; 
        padding: 40px 20px; 
        line-height: 1.5; 
        color: #24292f;
      }

      h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
      p.subtitle { color: #57606a; margin-bottom: 32px; }

      /* Discussion & Comments */
      .komment-comment { border: 1px solid var(--color-border); border-radius: 6px; margin: 16px 0; overflow: hidden; }
      .komment-comment-header { background-color: var(--color-bg-subtle); padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--color-border); font-size: 12px; color: #57606a; }
      .komment-comment-body { padding: 16px; }
      .komment-body { margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
      .komment-comment img { border-radius: 50%; }
      .komment-comment pre { background: var(--color-bg-subtle); padding: 16px; overflow: auto; border-radius: 6px; }

      /* Buttons - Modern Style */
      button, .create-btn {
        font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 6px;
        transition: all 0.2s cubic-bezier(0.3, 0, 0.5, 1); user-select: none; display: inline-flex;
        align-items: center; justify-content: center; gap: 8px; border: 1px solid rgba(27, 31, 36, 0.15);
      }

      /* Primary (Green) */
      #komment-submit, #login-btn, .create-btn, .komment-save-btn { 
        background-color: var(--color-btn-bg); color: #ffffff; padding: 8px 20px; box-shadow: var(--shadow-sm);
      }
      #komment-submit:hover, #login-btn:hover, .create-btn:hover, .komment-save-btn:hover { background-color: var(--color-btn-hover); }
      #komment-submit:active, #login-btn:active, .create-btn:active, .komment-save-btn:active { background-color: var(--color-btn-active); transform: translateY(1px); }
      #komment-submit:disabled { background-color: #94d3a2; border-color: rgba(27, 31, 36, 0.1); cursor: not-allowed; }

      /* Secondary (Gray/Outline) */
      .komment-logout-btn, .komment-cancel-btn {
        background-color: var(--color-bg-subtle); color: #57606a; padding: 6px 14px; font-size: 13px;
        border: 1px solid var(--color-border); box-shadow: var(--shadow-sm);
      }
      .komment-logout-btn:hover { color: var(--color-danger); background-color: var(--color-danger-bg); border-color: rgba(207, 34, 46, 0.15); }
      .komment-logout-btn:active { background-color: #f0f0f0; transform: translateY(1px); }

      /* Alerts & States */
      .error { color: var(--color-danger); background: var(--color-danger-bg); padding: 12px; border-radius: 6px; margin-top: 20px; border: 1px solid rgba(207, 34, 46, 0.15); }
      .info { background: var(--color-bg-subtle); padding: 32px; border-radius: 6px; border: 1px solid var(--color-border); text-align: center; }
      
      /* Editor */
      .komment-editor { margin-top: 32px; border-top: 1px solid var(--color-border); padding-top: 32px; }
      #komment-textarea { width: 100%; min-height: 120px; padding: 12px; border: 1px solid var(--color-border); border-radius: 6px; margin-bottom: 12px; font-family: inherit; box-sizing: border-box; font-size: 14px; }
      #komment-textarea:focus { outline: none; border-color: #0969da; box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.3); }

      .komment-actions { display: flex; gap: 8px; }
      .komment-edit-btn, .komment-delete-btn { background: none; border: none; color: #0969da; cursor: pointer; padding: 0; font-size: 12px; font-weight: 500; }
      .komment-edit-btn:hover, .komment-delete-btn:hover { text-decoration: underline; }
      .komment-delete-btn { color: var(--color-danger); }
    </style>
  </head>
  <body>
    <h1>Komment WASM</h1>
    <p class="subtitle">A high-performance commenting system powered by Rust and GitHub Discussions.</p>

    <p>
        Page content here
    </p>

    
    <div class="komment"></div>

    <script type="module">
      import "https://komment.s42.workers.dev/komment-embed.js";
      komment('seungjin/komment', {
        clientId: 'Iv23liQokIChd3ylSI7R'
      });
    </script>
  </body>
</html>
